<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단한 퍼즐 게임</title>
  <style>
    :root {
      --bg: #f4f5f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2f6fed;
      --accent-dark: #2459c8;
      --tile: #bff3cf;
      --tile-border: #a7e6bb;
      --tile-shadow: 0 6px 14px rgba(16, 185, 129, 0.08);
      --matched: #ffffff;
      --matched-bg: #dff8e7;
      --shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f7f8fb 0%, #eef1f6 100%);
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px 18px 18px;
    }

    .title {
      margin: 6px 0 6px;
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0 0 18px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .counter {
      font-size: 15px;
      font-weight: 700;
      color: #1f2937;
    }

    .restart {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(47, 111, 237, 0.25);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .restart:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .tile {
      aspect-ratio: 1 / 1;
      border: 1px solid var(--tile-border);
      border-radius: 16px;
      background: var(--tile);
      box-shadow: var(--tile-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      user-select: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .tile:hover {
      transform: translateY(-1px);
    }

    .tile.revealed {
      background: #dff9e7;
    }

    .tile.matched {
      background: var(--matched-bg);
      color: #000;
      cursor: default;
      box-shadow: none;
    }

    .tile.locked {
      cursor: default;
    }

    .message {
      margin: 16px 0 0;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #1f2937;
      min-height: 24px;
    }

    .message.win {
      color: #166534;
    }

    @media (max-width: 420px) {
      .app {
        padding: 18px 14px 14px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .tile {
        font-size: 26px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">간단한 퍼즐 게임</h1>
    <p class="subtitle">같은 그림 2개를 찾아 모두 맞추면 클리어입니다.</p>

    <div class="topbar">
      <div class="counter">시도 횟수: <span id="moves">0</span></div>
      <button class="restart" id="restartButton">다시 시작</button>
    </div>

    <section class="board" id="board" aria-label="퍼즐 보드"></section>
    <p class="message" id="message"></p>
  </main>

  <script>
    const emoji_list = ["🍇", "🍓", "🥝", "🍑", "🍉", "🍒", "🍊", "🍋"];
    const board_el = document.getElementById("board");
    const moves_el = document.getElementById("moves");
    const message_el = document.getElementById("message");
    const restart_button = document.getElementById("restartButton");

    // 첫 번째로 선택한 카드입니다.
    let first_tile = null;
    // 두 번째로 선택한 카드입니다.
    let second_tile = null;
    // 카드 2장을 비교하는 동안 다른 클릭을 막는 잠금 장치입니다.
    let is_locked = false;
    // 시도 횟수를 저장합니다.
    let moves_count = 0;
    // 맞춘 카드 쌍의 개수를 저장합니다.
    let matched_count = 0;
    // 틀린 카드를 다시 숨길 때 사용하는 타이머입니다.
    let mismatch_timer = null;

    // 배열을 무작위로 섞어서 반환합니다.
    function shuffle_array(array) {
      const copied_array = [...array];

      for (let index = copied_array.length - 1; index > 0; index -= 1) {
        const random_index = Math.floor(Math.random() * (index + 1));
        [copied_array[index], copied_array[random_index]] = [
          copied_array[random_index],
          copied_array[index]
        ];
      }

      return copied_array;
    }

    // 안내 문구를 화면에 보여줍니다.
    function set_message(message_text, is_win = false) {
      message_el.textContent = message_text;
      message_el.classList.toggle("win", is_win);
    }

    // 시도 횟수 표시를 갱신합니다.
    function set_moves_text() {
      moves_el.textContent = String(moves_count);
    }

    // 카드 선택 상태를 초기화합니다.
    function clear_selection() {
      first_tile = null;
      second_tile = null;
      is_locked = false;
    }

    // 두 카드가 같은 그림일 때 맞춘 카드로 표시합니다.
    function mark_matched_tiles(first_matched_tile, second_matched_tile) {
      first_matched_tile.classList.add("matched");
      second_matched_tile.classList.add("matched");
      first_matched_tile.classList.add("locked");
      second_matched_tile.classList.add("locked");
      first_matched_tile.removeAttribute("aria-pressed");
      second_matched_tile.removeAttribute("aria-pressed");
    }

    // 모든 짝을 다 맞췄는지 확인합니다.
    function check_win_state() {
      if (matched_count === emoji_list.length) {
        set_message(`축하합니다! ${moves_count}번 만에 모두 맞췄습니다.`, true);
      }
    }

    // 카드의 앞면을 보여줍니다.
    function reveal_tile(tile_element) {
      tile_element.classList.add("revealed");
      tile_element.textContent = tile_element.dataset.emoji;
      tile_element.setAttribute("aria-pressed", "true");
    }

    // 카드의 앞면을 다시 숨깁니다.
    function hide_tile(tile_element) {
      tile_element.classList.remove("revealed");
      tile_element.textContent = "";
      tile_element.removeAttribute("aria-pressed");
    }

    // 카드 1장을 만들어 반환합니다.
    function create_tile(emoji) {
      const tile_element = document.createElement("button");
      tile_element.type = "button";
      tile_element.className = "tile";
      tile_element.dataset.emoji = emoji;
      tile_element.textContent = "";
      tile_element.setAttribute("aria-label", "퍼즐 타일");
      tile_element.addEventListener("click", handle_tile_click);
      return tile_element;
    }

    // 틀린 카드 2장을 잠시 뒤 다시 숨깁니다.
    function hide_mismatch_tiles() {
      if (mismatch_timer) {
        clearTimeout(mismatch_timer);
      }

      mismatch_timer = setTimeout(() => {
        hide_tile(first_tile);
        hide_tile(second_tile);
        mismatch_timer = null;
        clear_selection();
      }, 650);
    }

    // 첫 번째 카드인지, 두 번째 카드인지에 따라 처리합니다.
    function handle_tile_click(event) {
      const clicked_tile = event.currentTarget;

      // 비교 중이거나, 이미 맞춘 카드이거나, 같은 카드를 다시 누르면 무시합니다.
      if (is_locked || clicked_tile.classList.contains("matched") || clicked_tile === first_tile) {
        return;
      }

      // 클릭한 카드는 일단 앞면을 보여줍니다.
      reveal_tile(clicked_tile);

      // 첫 번째 카드라면 저장만 하고 종료합니다.
      if (!first_tile) {
        first_tile = clicked_tile;
        return;
      }

      // 두 번째 카드가 눌렸으므로 이제 비교를 시작합니다.
      second_tile = clicked_tile;
      is_locked = true;
      moves_count += 1;
      set_moves_text();

      // 두 카드의 이모지가 같은지 비교합니다.
      const is_match = first_tile.dataset.emoji === second_tile.dataset.emoji;

      if (is_match) {
        mark_matched_tiles(first_tile, second_tile);
        matched_count += 1;
        set_message("정답입니다!");
        clear_selection();
        check_win_state();
        return;
      }

      set_message("다시 시도해 보세요.");
      hide_mismatch_tiles();
    }

    // 새 게임을 시작할 때 화면을 다시 그립니다.
    function render_game_board() {
      board_el.innerHTML = "";

      // 8개 이모지를 2장씩 넣어서 16장으로 만듭니다.
      const deck = shuffle_array([...emoji_list, ...emoji_list]);
      const tile_elements = deck.map(create_tile);

      tile_elements.forEach((tile_element) => {
        board_el.appendChild(tile_element);
      });
    }

    // 게임 상태를 처음부터 다시 시작합니다.
    function reset_game() {
      if (mismatch_timer) {
        clearTimeout(mismatch_timer);
        mismatch_timer = null;
      }

      clear_selection();
      moves_count = 0;
      matched_count = 0;

      set_moves_text();
      set_message("");
      render_game_board();
    }

    restart_button.addEventListener("click", reset_game);
    reset_game();
  </script>
</body>
</html>
