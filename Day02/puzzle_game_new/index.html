<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>퍼즐 게임</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <div class="screen active" id="startScreen" aria-label="게임 시작 화면">
      <div class="screen-panel">
        <h1 class="screen-title">퍼즐 게임</h1>
        <p class="screen-text">시작 버튼을 누르면 쉬움 단계부터 진행합니다.</p>
        <button class="screen-action" id="startButton" type="button">시작하기</button>
      </div>
    </div>

    <div class="screen" id="endScreen" aria-label="게임 종료 화면" aria-hidden="true">
      <div class="screen-panel">
        <h1 class="screen-title">축하합니다</h1>
        <p class="screen-text" id="endScreenText">모든 단계를 완료했습니다.</p>
        <button class="screen-action" id="playAgainButton" type="button">다시 하기</button>
      </div>
    </div>

    <div class="game" id="gameArea" hidden>
      <h1 class="title">퍼즐 게임</h1>
      <p class="subtitle">같은 그림 2개를 찾아 모든 단계를 완료하세요.</p>

      <section class="toolbar" aria-label="게임 정보">
        <div class="info-group">
          <div class="stat">시도 횟수: <span id="attemptCount">0</span></div>
          <div class="stat">점수: <span id="scoreCount">0</span></div>
          <div class="stat">남은 시간: <span id="timeCount">0</span>초</div>
          <button class="restart" id="restartButton" type="button">다시 시작</button>
        </div>

        <!--
        <label class="level" for="levelSelect">
          시작 단계
          <select id="levelSelect" aria-label="난이도 선택">
            <option value="easy">쉬움</option>
            <option value="normal1">보통1</option>
            <option value="normal2">보통2</option>
            <option value="hard">어려움</option>
          </select>
        </label>
        -->
      </section>

      <section class="board" id="board" aria-label="퍼즐 보드"></section>

      <div class="message" id="message">카드를 뒤집어서 같은 그림을 찾아보세요.</div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
